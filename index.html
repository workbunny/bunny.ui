<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyUI 2.x</title>
    <link rel="shortcut icon" href="bunny.png" type="image/x-icon">
    <link rel="stylesheet" href="/debug/bunny.css">
    <script src="/debug/bunny.js"></script>
    <meta name="keywords" content="BunnyUI, HTMX, Web UI, javascript,组件库">
    <meta name="description" content="BunnyUI 2.x 是一个基于 HTMX 拓展的 Web UI 组件库.">
</head>
<style>
    body {
        padding: 10px;
        width: 100%;
        margin: 0 auto;
        max-width: 1024px;
    }
</style>

<body>

    <center>
        <img src="bunny.png" alt="BunnyUI" width="128" height="128">
        <h1>BunnyUI 2.x</h1>
        <p>
            <button class="bny-btn" id="mode-btn">模式</button>
            <a href="https://htmx.org/" target="_blank" model="border" class="bny-btn">HTMX</a>
            <a href="https://github.com/workbunny/bunny.ui" target="_blank" color="blue" class="bny-btn">项目地址</a>
        </p>
        <p>现代化浏览器，无需额外配置</p>
        <span>🐇 HTMX 拓展 Web UI 组件库. 🐇</span>
    </center>

    <div hx-ext="bny-tab" mode="scroll">
        <ul class="head">
            <li hx-get="/test/button.html">样式-按钮</li>
            <li hx-get="/test/tag.html">样式-标签</li>
            <li hx-get="/test/subsidiary.html">样式-辅助</li>
            <li hx-get="/test/card.html">样式-卡片</li>
            <li hx-get="/test/form.html">组件-表单</li>
            <li hx-get="/test/menu.html">组件-菜单</li>
            <li hx-get="/test/collapse.html">组件-折叠面板</li>
            <li hx-get="/test/dropdown.html">组件-下拉菜单</li>
            <li hx-get="/test/alert.html">组件-警示信息</li>
            <li hx-get="/test/confirm.html">组件-确认信息</li>
            <li hx-get="/test/page.html">组件-页面信息</li>
            <li hx-get="/test/load.html">组件-加载</li>
            <li hx-get="/test/code.html">组件-代码</li>
            <li hx-get="/test/table.html">组件-表格</li>
            <li hx-get="/test/tab.html">组件-选项卡</li>
            <li hx-get="/test/js.html">JS-API</li>
        </ul>
        <div class="body">
        </div>
    </div>
    <script>
        document.getElementById('mode-btn').addEventListener('click', function () {
            document.documentElement.classList.toggle('dark');
        });
    </script>
</body>

</html>
