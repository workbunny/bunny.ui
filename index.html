<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyUI</title>
    <link rel="shortcut icon" href="bunny.png" type="image/x-icon">
    <link rel="stylesheet" href="/debug/bunny.css">
    <script src="/debug/bunny.js"></script>
</head>
<style>
    body {
        padding: 10px;
    }
</style>

<body>
    <div hx-ext="bny-menu" hx-get="/test/menu.json" hx-trigger="load" hx-headers='{"Accept": "application/json"}'></div>
    <br>
    <div hx-ext="bny-menu" mode="vertical">
        <div class="item">
            <div class="trigger">
                <span>菜单1</span>
            </div>
        </div>
        <div class="item">
            <div class="trigger">
                <span>菜单2</span>
            </div>
        </div>
        <div class="item">
            <div class="trigger">
                <span>菜单3</span>
                <i class="bny-icon">&#xe76e;</i>
            </div>
            <div class="sub-menu">
                <div class="item">
                    <div class="trigger">
                        <span>子菜单1</span>
                    </div>
                </div>
                <div class="item">
                    <div class="trigger">
                        <span>子菜单2</span>
                        <i class="bny-icon">&#xe76e;</i>
                    </div>
                    <div class="sub-menu">
                        <div class="item">
                            <div class="trigger">
                                <span>子子菜单1</span>
                            </div>
                        </div>
                        <div class="item">
                            <div class="trigger">
                                <span>子子菜单2</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="item">
                    <div class="trigger">
                        <span>子菜单3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <br>

</body>

</html>
