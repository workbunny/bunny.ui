<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyUI</title>
    <link rel="shortcut icon" href="bunny.png" type="image/x-icon">
    <link rel="stylesheet" href="/debug/bunny.css">
    <script src="/debug/bunny.js"></script>
    <meta name="keywords" content="BunnyUI, HTMX, Web UI, javascript,组件库">
    <meta name="description" content="BunnyUI 是一个基于 HTMX 拓展的 Web UI 组件库.">
</head>
<style>
    header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        width: 100%;
        background: var(--default);
        box-shadow: var(--box-shadow-005);

        & [hx-ext~="bny-nav"] {
            box-shadow: none;
        }
    }

    body>#bny-content {
        margin-top: 70px;
        overflow: auto;
    }

    footer {
        background: var(--white);
        padding: 30px 0;

        & * {
            color: var(--black);
        }
    }

    #tab-load {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99999;
    }

    .htmx-indicator {
        display: none;
        transition: all 0.3s ease-in-out;
        visibility: hidden;
        opacity: 0;
    }

    .htmx-request .htmx-indicator {
        display: inline;
        visibility: visible;
    }

    .htmx-request.htmx-indicator {
        display: inline;
        visibility: visible;
    }
</style>

<body>
    <!-- 头部 -->
    <header>
        <div class="bny-container">
            <div hx-ext="bny-nav" hx-indicator="#tab-load">
                <div class="head">
                    <div class="logo-box">
                        <div class="logo">
                            <img src="/bunny.png" alt="logo">
                        </div>
                        <span>BunnyUI</span>
                    </div>
                </div>
                <ul class="menu">
                    <li hx-get="/home.html" hx-target="#bny-content">
                        <div class="trigger">
                            <span>首页</span>
                        </div>
                    </li>
                    <li hx-get="/doc.html" hx-target="#bny-content">
                        <div class="trigger">
                            <span>组件</span>
                        </div>
                    </li>
                    <li id="mode-btn">
                        <div class="trigger">
                            <span>模式</span>
                        </div>
                    </li>
                    <li>
                        <a class="trigger" href="https://github.com/workbunny/bunny.ui" target="_blank">
                            <span><i class="bny-icon icon-github-fill"></i></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <div id="bny-content" hx-get="/home.html" hx-trigger="load"></div>
    <footer>
        <div class="bny-container">
            <div class="info">
                <span>Copyright © 2026 <a href="https://github.com/workbunny/bunny.ui" target="_blank"
                        rel="noopener noreferrer">BunnyUI</a> MIT Licensed</span>
            </div>
        </div>
    </footer>
</body>
<!-- 加载指示器 -->
<div id="tab-load">
    <div class="htmx-indicator">
        <div class="bny-load-health" color="green">
            <div></div>
        </div>
    </div>
</div>
<script>
    document.getElementById('mode-btn').addEventListener('click', function () {
        document.documentElement.classList.toggle('dark');
    });
</script>
